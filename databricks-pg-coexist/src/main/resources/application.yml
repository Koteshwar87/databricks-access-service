app:
  databricks:
    enabled: true
    hostname: ${DATABRICKS_HOST}
    http-path: ${DATABRICKS_HTTP_PATH}
    catalog: ${DATABRICKS_CATALOG:workspace}
    schema: ${DATABRICKS_SCHEMA:demo}
    client-id: ${DATABRICKS_CLIENT_ID}
    client-secret: ${DATABRICKS_CLIENT_SECRET}

  postgres:
    url: ${PG_URL:jdbc:postgresql://localhost:5432/holdings}
    username: ${PG_USERNAME:postgres}
    password: ${PG_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  holdings:
    routing:
      datasets:
        live: postgres
        historical: databricks

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always
      show-components: always

resilience4j:
  retry:
    instances:
      databricks:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.dao.DataAccessException
          - java.sql.SQLTransientException
  circuitbreaker:
    instances:
      databricks:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

logging:
  level:
    com.example.holdings: DEBUG
    com.zaxxer.hikari: INFO
    io.github.resilience4j: INFO
